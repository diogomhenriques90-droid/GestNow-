name: Auto-Learning Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'  # Executa a cada 6 horas
  workflow_dispatch:  # Permite execução manual

jobs:
  learn-and-improve:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy
      
      - name: Run auto-learning
        run: |
          python auto_learning.py
      
      - name: Generate training data
        run: |
          python -c "from auto_learning import generate_training_data; generate_training_data()" || true
      
      - name: Upload learning report
        uses: actions/upload-artifact@v3
        with:
          name: learning-report
          path: |
            learning_report.json
            training_data.json
      
      - name: Check if deployment needed
        id: check_deploy
        run: |
          if [ -f learning_report.json ]; then
            SHOULD_DEPLOY=$(python -c "import json; d=json.load(open('learning_report.json')); print(d.get('should_deploy', False))")
            echo "should_deploy=$SHOULD_DEPLOY" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit updated patterns
        if: always()
        run: |
          git config --local user.email "auto-learning@gestnow.com"
          git config --local user.name "Auto-Learning Bot"
          git add voice_patterns.json 2>/dev/null || true
          git add training_data.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto: Modelo atualizado via aprendizagem"
          git push || true
