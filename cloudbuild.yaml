steps:
  # 1. Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/gestnow-app', '.']

  # 2. Push da imagem para o Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gestnow-app']

  # 3. Deploy para o Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gestnow-v3'
      - '--image'
      - 'gcr.io/$PROJECT_ID/gestnow-app'
      - '--region'
      - 'europe-west1' # Altera para a tua região se necessário
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '2Gi' # IA e PDFs exigem memória
      - '--cpu'
      - '2'

images:
  - 'gcr.io/$PROJECT_ID/gestnow-app'
