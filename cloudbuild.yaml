
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/gestnow-app/gestnow-app:$COMMIT_SHA'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/gestnow-app/gestnow-app:$COMMIT_SHA'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gestnow-app'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/gestnow-app/gestnow-app:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/gestnow-app/gestnow-app:$COMMIT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY
